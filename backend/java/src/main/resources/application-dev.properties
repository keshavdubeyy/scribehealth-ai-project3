spring.application.name=scribehealth-backend-dev

# ── H2 In-Memory Database (Fallback) ──────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:scribehealthdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── JPA / Hibernate ───────────────────────────────────────────────────────
# update = create tables automatically for H2
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT ───────────────────────────────────────────────────────────────────
jwt.secret=dev_secret_key_scribehealth_2026_xK9mP3qL8nR5wT2v
jwt.expiry-hours=8

# ── Server ────────────────────────────────────────────────────────────────
server.port=8081
