spring.application.name=scribehealth-backend

# ── PostgreSQL / Supabase ──────────────────────────────────────────────────
# Connection pool (HikariCP default, tuned for Supabase free-tier limits)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate = check schema on startup without modifying it; use none in prod
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Tell Hibernate not to quote column names (Supabase schema uses lowercase)
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# ── JWT ───────────────────────────────────────────────────────────────────
jwt.secret=scribehealth_jwt_super_secret_key_2026_do_not_share_xK9mP3qL8nR5wT2v
jwt.expiry-hours=8

# ── Server ────────────────────────────────────────────────────────────────
server.port=8081
