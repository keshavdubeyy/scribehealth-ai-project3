<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScribeHealth AI — Doctor Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <script src="auth.js"></script>
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 6.5V12c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V6.5L12 2Z" fill="currentColor" opacity="0.2"/>
        <path d="M12 2L3 6.5V12c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V6.5L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">ScribeHealth <strong>AI</strong></span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item nav-item--active" data-section="overview">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
        Overview
      </a>
      <a href="#" class="nav-item" data-section="profile">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        My Profile
      </a>
    </nav>

    <button class="logout-btn" id="logout-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Log Out
    </button>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- Top Bar -->
    <header class="topbar">
      <div>
        <h1 class="page-title" id="page-title">Overview</h1>
        <p class="page-subtitle" id="page-subtitle">Welcome back, <span id="user-name-display">Doctor</span></p>
      </div>
      <div class="topbar-role">
        <span class="role-badge role-badge--doctor">DOCTOR</span>
      </div>
    </header>

    <!-- ===== OVERVIEW SECTION ===== -->
    <section id="section-overview" class="section">
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Account Status</span>
          <span class="stat-value" id="stat-status">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Member Since</span>
          <span class="stat-value" id="stat-created">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Last Login</span>
          <span class="stat-value" id="stat-login">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Role</span>
          <span class="stat-value" id="stat-role">—</span>
        </div>
      </div>
    </section>

    <!-- ===== PROFILE SECTION ===== -->
    <section id="section-profile" class="section" style="display:none;">
      <div class="card-panel">
        <h2 class="panel-title">My Profile</h2>
        <div id="profile-error" class="form-msg form-msg--error" style="display:none;"></div>
        <div id="profile-success" class="form-msg form-msg--success" style="display:none;"></div>

        <div class="info-grid">
          <div class="info-item"><span class="info-label">Name</span><span class="info-value" id="p-name">—</span></div>
          <div class="info-item"><span class="info-label">Email</span><span class="info-value" id="p-email">—</span></div>
          <div class="info-item"><span class="info-label">Role</span><span class="info-value" id="p-role">—</span></div>
          <div class="info-item"><span class="info-label">Status</span><span class="info-value" id="p-status">—</span></div>
        </div>

        <hr class="divider" />
        <h3 class="sub-title">Doctor Profile</h3>
        <form id="profile-form">
          <div class="field-group">
            <label class="field-label">Specialization</label>
            <input class="field-input" type="text" id="specialization" placeholder="e.g. Cardiology" />
          </div>
          <div class="field-group">
            <label class="field-label">License Number</label>
            <input class="field-input" type="text" id="licenseNumber" placeholder="e.g. MED-123456" />
          </div>
          <button type="submit" class="btn-primary">Save Changes</button>
        </form>
      </div>
    </section>

  </main>

  <script>
    const API   = 'http://localhost:8080/api';
    const token = localStorage.getItem('scribeToken');
    const name  = localStorage.getItem('scribeName');
    const role  = localStorage.getItem('scribeRole');

    // Guard — redirect to login if not authenticated or wrong role
    requireAuth(['DOCTOR', 'ADMIN']);

    document.getElementById('user-name-display').textContent = name || 'Doctor';

    // ===== NAV SWITCHING =====
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const target = item.dataset.section;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-item--active'));
        item.classList.add('nav-item--active');
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(`section-${target}`).style.display = 'block';
        document.getElementById('page-title').textContent =
          target === 'overview' ? 'Overview' : 'My Profile';
        document.getElementById('page-subtitle').textContent =
          target === 'overview' ? `Welcome back, ${name}` : 'View and update your information';
      });
    });

    // ===== LOGOUT =====
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('scribeToken');
      localStorage.removeItem('scribeRole');
      localStorage.removeItem('scribeName');
      window.location.href = 'login.html';
    });

    // ===== LOAD PROFILE =====
    async function loadProfile() {
      try {
        const res = await fetch(`${API}/doctor/profile`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401 || res.status === 403) {
          localStorage.clear(); window.location.href = 'login.html'; return;
        }
        const data = await res.json();

        // Overview stats
        document.getElementById('stat-status').textContent  = data.active ? '✅ Active' : '🚫 Inactive';
        document.getElementById('stat-created').textContent = data.createdAt   ? new Date(data.createdAt).toLocaleDateString()   : '—';
        document.getElementById('stat-login').textContent   = data.lastLoginAt ? new Date(data.lastLoginAt).toLocaleString()      : '—';
        document.getElementById('stat-role').textContent    = data.role;

        // Profile section
        document.getElementById('p-name').textContent   = data.name;
        document.getElementById('p-email').textContent  = data.email;
        document.getElementById('p-role').textContent   = data.role;
        document.getElementById('p-status').textContent = data.active ? 'Active' : 'Inactive';
        document.getElementById('specialization').value = data.specialization || '';
        document.getElementById('licenseNumber').value  = data.licenseNumber  || '';
      } catch (err) {
        console.error('Failed to load profile', err);
      }
    }

    // ===== SAVE PROFILE =====
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('profile-error').style.display   = 'none';
      document.getElementById('profile-success').style.display = 'none';
      try {
        const res = await fetch(`${API}/doctor/profile`, {
          method:  'PATCH',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            specialization: document.getElementById('specialization').value,
            licenseNumber:  document.getElementById('licenseNumber').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Update failed');
        const s = document.getElementById('profile-success');
        s.textContent = 'Profile updated successfully!';
        s.style.display = 'block';
      } catch (err) {
        const e2 = document.getElementById('profile-error');
        e2.textContent = err.message;
        e2.style.display = 'block';
      }
    });

    loadProfile();
  </script>

</body>
</html>
